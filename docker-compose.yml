services:
  mysql:
    image: mysql:8.0
    container_name: wasteiq-mysql
    restart: always
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - wasteiq-network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wasteiq-api
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      BACKEND_BASE_URL: ${BACKEND_BASE_URL:-http://localhost:8000}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      UPLOADS_DIR: /app/api/uploads
      MODEL_PATH: /app/api/models/best_waste_model.h5
    ports:
      - "8000:8000"
    volumes:
      - ./api/uploads:/app/api/uploads
    networks:
      - wasteiq-network

volumes:
  mysql_data:

networks:
  wasteiq-network:
